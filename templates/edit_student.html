{% extends "layout.html" %}
{% block title %}Edit Student{% endblock %}
{% block content %}
<div class="my-4 fade-up">
    <h2 class="page-title m-0"><i class="las la-user-edit me-1"></i>Update Information</h2>
    <p class="text-muted">Modifying records for {{ student.student_id }}</p>
</div>

<div class="row fade-up-2">
    <div class="col-md-6">
        <div class="card-ui p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-600">Full Name</label>
                    <input type="text" name="full_name" class="form-control" value="{{ student.full_name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-600">Department</label>
                    <input type="text" name="department" class="form-control" value="{{ student.department }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-600">Email Address</label>
                    <input type="email" name="email" class="form-control" value="{{ student.email }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-600">Phone Number</label>
                    <input type="text" name="phone" class="form-control" value="{{ student.phone }}">
                </div>
                <div class="mt-4 pt-3 border-top">
                    <button type="submit" class="btn btn-primary-ui">Save Changes</button>
                    <a href="{{ url_for('student_list') }}" class="btn btn-light border ms-2">Back to List</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
