{% extends "layout.html" %}
{% block title %}Manage Subjects{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center my-4 fade-up">
    <h2 class="page-title m-0"><i class="las la-book me-1"></i>Institutional Subjects</h2>
</div>

<div class="row g-4">
    <div class="col-md-4 fade-up-2">
        <div class="card-ui p-4">
            <h5 class="fw-bold mb-3">Add New Subject</h5>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-600">Subject Code</label>
                    <input type="text" name="code" class="form-control" placeholder="e.g. CSE-101" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-600">Subject Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Introduction to Computing" required>
                </div>
                <button type="submit" class="btn btn-primary-ui w-100">Register Subject</button>
            </form>
        </div>
    </div>
    <div class="col-md-8 fade-up-3">
        <div class="card-ui p-0">
            <table class="table table-ui mb-0">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Subject Name</th>
                        <th width="100">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for sub in subjects %}
                    <tr>
                        <td class="fw-bold text-primary">{{ sub.code }}</td>
                        <td class="fw-600">{{ sub.name }}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger border-0"><i class="las la-trash"></i></button>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center text-muted py-4">No subjects registered yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
